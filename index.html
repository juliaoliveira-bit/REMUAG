<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remuneração de Agências de Propaganda — SECOM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&family=Inter:wght@400;500;600;700;800&display=swap');

:root{
  --blue-900:#071D41;
  --blue-700:#1351B4;
  --blue-500:#2670E8;
  --blue-100:#E6EEF9;
  --green-600:#0F8A4A;
  --amber-600:#B8860B;
  --amber-100:#FBF1DA;
  --paper:#EEEFF0;
  --card:#FFFFFF;
  --ink-900:#101820;
  --ink-600:#4A5560;
  --ink-400:#889199;
  --line:#DCDDDF;
  --radius:14px;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  background-image:
    radial-gradient(circle at 1px 1px, rgba(7,29,65,0.055) 1px, transparent 0);
  background-size:22px 22px;
  color:var(--ink-900);
  font-family:'Inter',-apple-system,sans-serif;
  min-height:100vh;
  padding-bottom:60px;
}

/* ---------- HEADER ---------- */
header{
  background:var(--paper);
  color:var(--ink-900);
  padding:36px 24px 44px;
  position:relative;
  overflow:hidden;
}
header::after{
  content:"";
  position:absolute;
  right:-60px; top:-60px;
  width:280px;height:280px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(19,81,180,0.10), transparent 70%);
}
.header-inner{
  max-width:1180px;
  margin:0 auto;
  position:relative;
}
h1{
  font-family:'Source Serif 4',serif;
  font-weight:700;
  font-size:clamp(26px,3.4vw,38px);
  line-height:1.15;
  margin:0 0 6px;
  max-width:760px;
  position:relative;
  color:var(--blue-700);
}
h1 em{font-style:normal;color:var(--blue-900);}
.subtitle{
  color:var(--ink-600);
  font-size:15px;
  max-width:640px;
  margin:0;
  position:relative;
}

/* ---------- KPI STRIP ---------- */
.kpis{
  max-width:1180px;
  margin:-30px auto 0;
  padding:0 24px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  position:relative;
  z-index:2;
}
.kpi{
  background:var(--card);
  border-radius:var(--radius);
  padding:16px 18px;
  box-shadow:0 10px 26px -14px rgba(7,29,65,.35);
  border:1px solid var(--line);
}
.kpi .num{
  font-family:'Source Serif 4',serif;
  font-size:23px;font-weight:700;color:var(--blue-900);
  line-height:1.1;
}
.kpi .lbl{font-size:12px;color:var(--ink-600);margin-top:4px;font-weight:500;}

/* ---------- TABS ---------- */
.tabs-wrap{
  max-width:1180px;margin:34px auto 0;padding:0 24px;
}
.tabs{
  display:inline-flex;background:var(--card);border:1px solid var(--line);
  border-radius:999px;padding:4px;gap:2px;
}
.tab-btn{
  border:none;background:transparent;padding:10px 20px;border-radius:999px;
  font-family:inherit;font-size:13.5px;font-weight:700;color:var(--ink-600);
  cursor:pointer;transition:background .15s, color .15s;
}
.tab-btn.active{background:var(--blue-700);color:#fff;}

/* ---------- CONTROLS ---------- */
.controls-wrap{
  max-width:1180px;margin:20px auto 0;padding:0 24px;
}
.controls{
  display:flex;gap:12px;flex-wrap:wrap;align-items:center;
}
.search-box{
  flex:1 1 320px;position:relative;
}
.search-box input{
  width:100%;
  padding:13px 16px 13px 42px;
  border-radius:999px;
  border:1px solid var(--line);
  background:var(--card);
  font-size:14px;
  font-family:inherit;
  color:var(--ink-900);
  outline:none;
  transition:border-color .15s, box-shadow .15s;
}
.search-box input:focus{border-color:var(--blue-500);box-shadow:0 0 0 3px var(--blue-100);}
.search-box svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);opacity:.45;}

select{
  padding:13px 38px 13px 16px;
  border-radius:999px;
  border:1px solid var(--line);
  background:var(--card) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="12" height="8" viewBox="0 0 12 8" fill="none"><path d="M1 1L6 6L11 1" stroke="%23636F7A" stroke-width="1.6" stroke-linecap="round"/></svg>') no-repeat right 16px center;
  appearance:none;
  font-family:inherit;
  font-size:14px;
  color:var(--ink-900);
  outline:none;
  cursor:pointer;
  min-width:220px;
}
select:focus{border-color:var(--blue-500);}

/* ---------- MULTI-SELECT (checkbox dropdown) ---------- */
.ms-filter{position:relative;}
.ms-btn{
  padding:13px 38px 13px 16px;
  border-radius:999px;
  border:1px solid var(--line);
  background:var(--card) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="12" height="8" viewBox="0 0 12 8" fill="none"><path d="M1 1L6 6L11 1" stroke="%23636F7A" stroke-width="1.6" stroke-linecap="round"/></svg>') no-repeat right 16px center;
  font-family:inherit;
  font-size:14px;
  color:var(--ink-900);
  outline:none;
  cursor:pointer;
  min-width:220px;
  text-align:left;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  display:inline-block;
}
.ms-btn:focus, .ms-filter.open .ms-btn{border-color:var(--blue-500);box-shadow:0 0 0 3px var(--blue-100);}
.ms-panel{
  display:none;
  position:absolute;top:calc(100% + 6px);left:0;z-index:20;
  background:var(--card);border:1px solid var(--line);border-radius:12px;
  box-shadow:0 16px 34px -16px rgba(7,29,65,.35);
  min-width:280px;max-width:360px;max-height:320px;overflow-y:auto;
  padding:8px;
}
.ms-filter.open .ms-panel{display:block;}
.ms-actions{display:flex;gap:8px;padding:4px 6px 8px;border-bottom:1px solid var(--line);margin-bottom:4px;}
.ms-actions button{
  border:none;background:transparent;color:var(--blue-700);font-weight:600;
  font-family:inherit;font-size:12.5px;cursor:pointer;padding:2px 4px;
}
.ms-option{
  display:flex;align-items:center;gap:9px;
  padding:7px 6px;border-radius:8px;cursor:pointer;font-size:13.5px;color:var(--ink-900);
}
.ms-option:hover{background:var(--blue-100);}
.ms-option input{cursor:pointer;}

.count-row{
  display:flex;justify-content:space-between;align-items:baseline;
  margin:22px 2px 14px;
  font-size:13px;color:var(--ink-600);
}
.count-row b{color:var(--blue-900);font-weight:700;}
.sort-select{
  border:none;background:transparent;color:var(--blue-700);font-weight:600;
  font-family:inherit;font-size:13px;cursor:pointer;
}

/* ---------- GRID / CARDS ---------- */
.grid{
  max-width:1180px;margin:0 auto;padding:0 24px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px;
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:18px;
  cursor:pointer;
  transition:transform .15s ease, box-shadow .15s ease, border-color .15s;
  position:relative;
  display:flex;flex-direction:column;gap:12px;
}
.card:hover{
  transform:translateY(-3px);
  box-shadow:0 16px 30px -18px rgba(7,29,65,.4);
  border-color:#C8D6ED;
}
.badge{
  display:inline-flex;align-items:center;
  background:var(--blue-100);color:var(--blue-700);
  font-size:11px;font-weight:800;letter-spacing:.03em;
  padding:5px 10px;border-radius:7px;
  align-self:flex-start;
}
.card-expand{
  position:absolute;top:14px;right:14px;
  width:26px;height:26px;border-radius:50%;
  background:var(--blue-100);color:var(--blue-700);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;line-height:1;
  pointer-events:none;
  transition:background .15s, color .15s;
}
.card:hover .card-expand{background:var(--blue-700);color:#fff;}
.card-title{font-size:16px;font-weight:700;color:var(--ink-900);line-height:1.3;}
.card-agency{font-size:13px;color:var(--ink-600);margin-top:-6px;}
.card-agency-list{display:flex;flex-direction:column;gap:3px;margin-top:-4px;}
.card-agency-item{font-size:13px;color:var(--ink-600);}
.card-divider{height:1px;background:var(--line);margin:0;}
.card-bottom{display:flex;justify-content:space-between;align-items:flex-end;}
.card-value-lbl{font-size:11px;color:var(--ink-400);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.card-value{font-family:'Source Serif 4',serif;font-size:19px;font-weight:700;color:var(--blue-900);}
.status-tags{display:flex;gap:6px;}
.tag{
  font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:999px;letter-spacing:.02em;
}
.tag.vigente{background:#E5F5EA;color:var(--green-600);}
.tag.encerrado{background:#F0EEE7;color:var(--ink-400);}
.tag.contrato{background:var(--amber-100);color:var(--amber-600);}

.empty{
  text-align:center;padding:70px 20px;color:var(--ink-400);
  grid-column:1/-1;
}
.empty svg{opacity:.35;margin-bottom:14px;}

/* ---------- SERVICE VIEW ---------- */
.service-intro{
  max-width:1180px;margin:0 auto;padding:0 24px 6px;
  font-size:13px;color:var(--ink-600);
}
.service-list{
  max-width:1180px;margin:0 auto;padding:0 24px;
  display:flex;flex-direction:column;gap:10px;
}
.service-row{
  background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:14px 18px;display:flex;align-items:center;gap:16px;
  cursor:pointer;transition:border-color .15s, transform .15s;
}
.service-row:hover{border-color:#C8D6ED;transform:translateX(2px);}
.service-row .sr-org{flex:1 1 auto;min-width:0;}
.service-row .sr-org .name{font-weight:700;font-size:14.5px;color:var(--ink-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.service-row .sr-org .agency{font-size:12.5px;color:var(--ink-600);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.service-row .sr-value{
  flex:0 0 auto;text-align:right;min-width:150px;
}
.service-row .sr-value .v{
  font-family:'Source Serif 4',serif;font-weight:700;font-size:18px;color:var(--blue-700);
}
.service-row .sr-value .lbl{font-size:10.5px;color:var(--ink-400);text-transform:uppercase;letter-spacing:.04em;}
.sr-badge{
  flex:0 0 auto;
  background:var(--blue-100);color:var(--blue-700);
  font-size:11px;font-weight:800;padding:5px 10px;border-radius:7px;
}

/* ---------- MODAL ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(7,15,29,.55);
  backdrop-filter:blur(2px);
  display:none;align-items:flex-start;justify-content:center;
  padding:5vh 16px;z-index:100;overflow-y:auto;
}
.overlay.open{display:flex;}
.modal{
  background:var(--card);border-radius:18px;max-width:720px;width:100%;
  padding:0;box-shadow:0 30px 70px -20px rgba(0,0,0,.4);
  animation:pop .18s ease;
}
@keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98);}to{opacity:1;transform:none;}}
.modal-head{
  background:linear-gradient(135deg,var(--blue-900),#123C7A);
  color:#fff;padding:26px 28px;border-radius:18px 18px 0 0;position:relative;
}
.modal-close{
  position:absolute;top:18px;right:18px;
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.15);border:none;color:#fff;
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.modal-close:hover{background:rgba(255,255,255,.28);}
.modal-badge{display:inline-block;background:rgba(255,255,255,.18);padding:4px 10px;border-radius:7px;font-size:11px;font-weight:800;letter-spacing:.03em;margin-bottom:10px;}
.modal-org{font-family:'Source Serif 4',serif;font-size:21px;font-weight:700;margin:0 0 4px;padding-right:40px;}
.modal-agency{font-size:14px;color:#B9CBE6;margin:0;}

.modal-body{padding:22px 28px 28px;}
.section-title{
  font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;
  color:var(--blue-700);margin:22px 0 10px;
}
.section-title:first-child{margin-top:0;}
.field-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px 18px;
}
.field{
  border-bottom:1px dashed var(--line);
  padding-bottom:8px;
}
.field .k{font-size:11.5px;color:var(--ink-400);margin-bottom:2px;}
.field .v{font-size:13.5px;color:var(--ink-900);font-weight:600;word-break:break-word;}
.pct-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
}
.pct-chip{
  background:var(--paper);border:1px solid var(--line);border-radius:10px;
  padding:10px 12px;
}
.pct-chip .k{font-size:10.5px;color:var(--ink-600);line-height:1.3;margin-bottom:5px;}
.pct-chip .v{font-family:'Source Serif 4',serif;font-size:16px;font-weight:700;color:var(--blue-900);word-break:break-word;}

@media (max-width:720px){
  .kpis{grid-template-columns:repeat(2,1fr);}
  .field-grid{grid-template-columns:1fr;}
  .pct-grid{grid-template-columns:repeat(2,1fr);}
  .service-row{flex-wrap:wrap;}
  .service-row .sr-value{text-align:left;min-width:0;}
}
</style>
</head>

<header>

    <h1>Anunciantes do Poder Executivo Federal — Remuneração de <em>Agências de Propaganda</em></h1>
    <p class="subtitle">Consulta de contratos vigentes de publicidade firmados por órgãos e entidades do Poder Executivo Federal com agências de propaganda.</p>
  </div>
</header>

<div class="kpis" id="kpis"></div>

<div class="tabs-wrap">

  </div>
</div>

<!-- CONTRATOS TAB -->
<div id="tab-contratos">
  <div class="controls-wrap">
    <div class="controls">

    </div>
    <div class="count-row">
      <span><b id="resultCount">0</b> contratos</span>
      <select class="sort-select" id="sortSelect">
        <option value="orgao">Ordenar por órgão</option>
        <option value="valorDesc">Maior valor</option>
        <option value="valorAsc">Menor valor</option>
        <option value="vencimento">Vencimento mais próximo</option>
      </select>
    </div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- SERVIÇOS TAB -->
<div id="tab-servicos" style="display:none;">
  <div class="controls-wrap">
    <div class="controls">
      <select id="serviceSelect"></select>
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5.2" stroke="#4A5560" stroke-width="1.6"/><path d="M11 11L14.5 14.5" stroke="#4A5560" stroke-width="1.6" stroke-linecap="round"/></svg>
        <input id="serviceSearch" type="text" placeholder="Buscar órgão ou agência…">
      </div>
    </div>
    <div class="count-row">
      <span><b id="serviceResultCount">0</b> contratos com essa cláusula</span>
    </div>
  </div>
  <div class="service-intro" id="serviceDescription"></div>
  <div class="service-list" id="serviceList" style="margin-top:14px;"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

/* ---------- group agencies under the same órgão + licitação (same contract) ---------- */
function buildGroups(){
  const map = new Map();
  const order = [];
  DATA.forEach(d=>{
    const key = d.orgao + '||' + d.licitacao;
    if(!map.has(key)){
      map.set(key, {...d, agencies: []});
      order.push(key);
    }
    map.get(key).agencies.push({
      agencia: d.agencia,
      siglaAgencia: d.siglaAgencia,
      cnpj: d.cnpj,
      contrato: d.contrato,
    });
  });
  return order.map(k=>map.get(k));
}
const GROUPS = buildGroups();

const TODAY = new Date(2026,6,8); // 08/07/2026

function parseBR(d){
  if(!d) return null;
  const [dd,mm,yyyy] = d.split('/').map(Number);
  return new Date(yyyy, mm-1, dd);
}
function isVigente(rec){
  const t = parseBR(rec.terminoVigenciaAtual);
  return t ? t >= TODAY : true;
}
function fmtMoney(v){
  if(v == null) return '—';
  if(v >= 1e6){
    const m = v/1e6;
    return 'R$ ' + (Number.isInteger(m) ? m : m.toFixed(1).replace(/\.0$/,'')) + ' milhões';
  }
  return 'R$ ' + v.toLocaleString('pt-BR');
}
function fmtMoneyFull(v){
  if(v == null) return '—';
  return v.toLocaleString('pt-BR', {style:'currency', currency:'BRL', maximumFractionDigits:0});
}
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- populate org filter (checkbox dropdown) ---------- */
const orgs = [...new Set(DATA.map(d=>d.orgao))].sort((a,b)=>a.localeCompare(b,'pt'));
const selectedOrgs = new Set();
const orgFilterWrap = document.getElementById('orgFilterWrap');
const orgFilterBtn = document.getElementById('orgFilterBtn');
const orgFilterPanel = document.getElementById('orgFilterPanel');

orgFilterPanel.innerHTML = `
  <div class="ms-actions">
    <button type="button" id="orgSelectAll">Selecionar todos</button>
    <button type="button" id="orgClearAll">Limpar</button>
  </div>
  ${orgs.map(o=>`
    <label class="ms-option">
      <input type="checkbox" value="${escapeHtml(o)}">
      <span>${escapeHtml(o)}</span>
    </label>
  `).join('')}
`;

function updateOrgFilterBtn(){
  if(selectedOrgs.size === 0) orgFilterBtn.textContent = 'Todos os órgãos';
  else if(selectedOrgs.size === 1) orgFilterBtn.textContent = [...selectedOrgs][0];
  else orgFilterBtn.textContent = selectedOrgs.size + ' órgãos selecionados';
}

orgFilterPanel.querySelectorAll('.ms-option input').forEach(cb=>{
  cb.addEventListener('change', ()=>{
    if(cb.checked) selectedOrgs.add(cb.value);
    else selectedOrgs.delete(cb.value);
    updateOrgFilterBtn();
    render();
    renderServiceList();
  });
});

document.getElementById('orgSelectAll').addEventListener('click', ()=>{
  orgFilterPanel.querySelectorAll('.ms-option input').forEach(cb=>{ cb.checked = true; selectedOrgs.add(cb.value); });
  updateOrgFilterBtn();
  render();
  renderServiceList();
});
document.getElementById('orgClearAll').addEventListener('click', ()=>{
  orgFilterPanel.querySelectorAll('.ms-option input').forEach(cb=>{ cb.checked = false; });
  selectedOrgs.clear();
  updateOrgFilterBtn();
  render();
  renderServiceList();
});

orgFilterBtn.addEventListener('click', (e)=>{
  e.stopPropagation();
  orgFilterWrap.classList.toggle('open');
});
document.addEventListener('click', (e)=>{
  if(!orgFilterWrap.contains(e.target)) orgFilterWrap.classList.remove('open');
});

  const opt = document.createElement('option');
  opt.value = i; opt.textContent = r.label;
  valueSel.appendChild(opt);
});

/* ---------- populate service select ---------- */
const svcSel = document.getElementById('serviceSelect');
SERVICE_FIELDS.forEach(s=>{
  const opt = document.createElement('option');
  opt.value = s.key; opt.textContent = s.short;
  svcSel.appendChild(opt);
});

/* ---------- KPIs ---------- */
function renderKPIs(){
  const total = GROUPS.reduce((a,g)=>a+(g.valorAtualizado||0),0);
  const nOrgs = orgs.length;
  const vigentes = GROUPS.filter(isVigente).length;

  const kpis = [
    {num: GROUPS.length, lbl:'Contratos no total'},
    {num: (total/1e9).toFixed(2)+' bi', lbl:'Valor total atualizado (R$)'},
    {num: nOrgs, lbl:'Órgãos/entidades'},
    {num: vigentes, lbl:'Contratos vigentes hoje'},
  ];
  document.getElementById('kpis').innerHTML = kpis.map(k=>`
    <div class="kpi"><div class="num">${k.num}</div><div class="lbl">${k.lbl}</div></div>
  `).join('');
}
renderKPIs();

/* ---------- CONTRATOS: render ---------- */
function matchesSearch(g, q){
  if(!q) return true;
  q = q.toLowerCase();
  if(g.orgao.toLowerCase().includes(q) || g.sigla.toLowerCase().includes(q)) return true;
  return g.agencies.some(a=>
    a.agencia.toLowerCase().includes(q) ||
    a.siglaAgencia.toLowerCase().includes(q) ||
    a.cnpj.includes(q)
  );
}

function render(){
  const q = document.getElementById('search').value.trim();
  const status = document.getElementById('statusFilter').value;
  const valueRange = document.getElementById('valueFilter').value;
  const sort = document.getElementById('sortSelect').value;

  let list = GROUPS.filter(g=>{
    if(selectedOrgs.size && !selectedOrgs.has(g.orgao)) return false;
    if(status === 'vigente' && !isVigente(g)) return false;
    if(status === 'encerrado' && isVigente(g)) return false;
    if(valueRange !== ''){
      const r = VALUE_RANGES[+valueRange];
      const v = g.valorOriginal || 0;
      if(!(v > r.min && v <= r.max)) return false;
    }
    if(!matchesSearch(g,q)) return false;
    return true;
  });

  if(sort === 'orgao') list.sort((a,b)=>a.orgao.localeCompare(b.orgao,'pt'));
  if(sort === 'valorDesc') list.sort((a,b)=>(b.valorAtualizado||0)-(a.valorAtualizado||0));
  if(sort === 'valorAsc') list.sort((a,b)=>(a.valorAtualizado||0)-(b.valorAtualizado||0));
  if(sort === 'vencimento') list.sort((a,b)=>{
    const ta = parseBR(a.terminoVigenciaAtual), tb = parseBR(b.terminoVigenciaAtual);
    return (ta?ta.getTime():Infinity) - (tb?tb.getTime():Infinity);
  });

  document.getElementById('resultCount').textContent = list.length;
  const grid = document.getElementById('grid');

  if(list.length === 0){
    grid.innerHTML = `<div class="empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#889199" stroke-width="1.6"/><path d="M16 16L21 21" stroke="#889199" stroke-width="1.6" stroke-linecap="round"/></svg>
      <div>Nenhum contrato encontrado com esses filtros.</div>
    </div>`;
    return;
  }

  grid.innerHTML = list.map((g)=>{
    const idx = GROUPS.indexOf(g);
    return `
    <div class="card" data-idx="${idx}">
      <span class="card-expand">+</span>
      <span class="badge">${escapeHtml(g.sigla)}</span>
      <div>
        <div class="card-title">${escapeHtml(g.orgao)}</div>
        <div class="card-agency-list">
          ${g.agencies.map(a=>`<div class="card-agency-item">${escapeHtml(a.siglaAgencia || a.agencia)}</div>`).join('')}
        </div>
      </div>
      <div class="card-divider"></div>
      <div class="card-bottom">
        <div>
          <div class="card-value-lbl">Valor atualizado</div>
          <div class="card-value">${fmtMoney(g.valorAtualizado)}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  grid.querySelectorAll('.card').forEach(el=>{
    el.addEventListener('click', ()=> openModal(GROUPS[+el.dataset.idx]));
  });
}

/* ---------- SERVIÇOS: render ---------- */
function renderServiceList(){
  const key = svcSel.value;
  const field = SERVICE_FIELDS.find(s=>s.key===key);
  const q = document.getElementById('serviceSearch').value.trim().toLowerCase();
  const mainQ = document.getElementById('search').value.trim();
  const status = document.getElementById('statusFilter').value;
  const valueRange = document.getElementById('valueFilter').value;

  document.getElementById('serviceDescription').textContent =
    `Mostrando a cláusula "${field.label}" para cada contrato.`;

  let list = GROUPS.filter(g=>{
    if(selectedOrgs.size && !selectedOrgs.has(g.orgao)) return false;
    if(status === 'vigente' && !isVigente(g)) return false;
    if(status === 'encerrado' && isVigente(g)) return false;
    if(valueRange !== ''){
      const r = VALUE_RANGES[+valueRange];
      const v = g.valorOriginal || 0;
      if(!(v > r.min && v <= r.max)) return false;
    }
    if(!matchesSearch(g, mainQ)) return false;
    if(!q) return true;
    if(g.orgao.toLowerCase().includes(q) || g.sigla.toLowerCase().includes(q)) return true;
    return g.agencies.some(a=>
      a.agencia.toLowerCase().includes(q) ||
      a.siglaAgencia.toLowerCase().includes(q)
    );
  });

  list = [...list].sort((a,b)=>a.orgao.localeCompare(b.orgao,'pt'));

  document.getElementById('serviceResultCount').textContent = list.length;
  const wrap = document.getElementById('serviceList');

  if(list.length === 0){
    wrap.innerHTML = `<div class="empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#889199" stroke-width="1.6"/><path d="M16 16L21 21" stroke="#889199" stroke-width="1.6" stroke-linecap="round"/></svg>
      <div>Nenhum órgão encontrado com essa busca.</div>
    </div>`;
    return;
  }

  wrap.innerHTML = list.map(g=>{
    const idx = GROUPS.indexOf(g);
    const val = g[key] || '—';
    return `
    <div class="service-row" data-idx="${idx}">
      <span class="sr-badge">${escapeHtml(g.sigla)}</span>
      <div class="sr-org">
        <div class="name">${escapeHtml(g.orgao)}</div>
      </div>
      <div class="sr-value">
        <div class="v">${escapeHtml(val)}</div>
        <div class="lbl">${escapeHtml(field.short)}</div>
      </div>
    </div>`;
  }).join('');

  wrap.querySelectorAll('.service-row').forEach(el=>{
    el.addEventListener('click', ()=> openModal(GROUPS[+el.dataset.idx]));
  });
}

/* ---------- MODAL ---------- */
function openModal(g){
  const vig = isVigente(g);
  const pctChips = SERVICE_FIELDS.map(s=>`
    <div class="pct-chip"><div class="k">${escapeHtml(s.short)}</div><div class="v">${escapeHtml(g[s.key])||'—'}</div></div>
  `).join('');
  const agencyRows = g.agencies.map(a=>`
    <div class="field"><div class="k">${escapeHtml(a.siglaAgencia || a.agencia)}</div><div class="v">Contrato ${escapeHtml(a.contrato)||'—'} · CNPJ ${escapeHtml(a.cnpj)||'—'}</div></div>
  `).join('');

  document.getElementById('modal').innerHTML = `
    <div class="modal-head">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <span class="modal-badge">${escapeHtml(g.sigla)} · ${vig?'Vigente':'Encerrado'}</span>
      <div class="modal-org">${escapeHtml(g.orgao)}</div>
      <div class="modal-agency">${g.agencies.map(a=>escapeHtml(a.siglaAgencia || a.agencia)).join(' · ')}</div>
    </div>
    <div class="modal-body">
      <div class="section-title">Agências</div>
      <div class="field-grid">
        ${agencyRows}
      </div>

      <div class="section-title">Identificação do contrato</div>
      <div class="field-grid">
        <div class="field"><div class="k">Nº da licitação</div><div class="v">${escapeHtml(g.licitacao)||'—'}</div></div>
        <div class="field"><div class="k">Valor original do contrato</div><div class="v">${fmtMoneyFull(g.valorOriginal)}</div></div>
        <div class="field"><div class="k">Valor do contrato atualizado</div><div class="v">${fmtMoneyFull(g.valorAtualizado)}</div></div>
      </div>

      <div class="section-title">Vigência</div>
      <div class="field-grid">
        <div class="field"><div class="k">Início do contrato original</div><div class="v">${g.inicioContratoOriginal||'—'}</div></div>
        <div class="field"><div class="k">Limite vigência total</div><div class="v">${g.limiteVigenciaTotal||'—'}</div></div>
        <div class="field"><div class="k">Início vigência atual</div><div class="v">${g.inicioVigenciaAtual||'—'}</div></div>
        <div class="field"><div class="k">Término vigência atual</div><div class="v">${g.terminoVigenciaAtual||'—'}</div></div>
      </div>

      <div class="section-title">Serviços e remuneração</div>
      <div class="pct-grid">
        ${pctChips}
      </div>
    </div>
  `;
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
document.getElementById('overlay').addEventListener('click', e=>{
  if(e.target.id === 'overlay') closeModal();
});
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

['search','statusFilter','valueFilter'].forEach(id=>{
  document.getElementById(id).addEventListener('input', ()=>{ render(); renderServiceList(); });
  document.getElementById(id).addEventListener('change', ()=>{ render(); renderServiceList(); });
});
document.getElementById('sortSelect').addEventListener('change', render);
['serviceSelect','serviceSearch'].forEach(id=>{
  document.getElementById(id).addEventListener('input', renderServiceList);
  document.getElementById(id).addEventListener('change', renderServiceList);
});

render();
renderServiceList();
</script>
</body>
</html>
